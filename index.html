<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>TO-DO List</h1>

    //User Management Section
    <div class="user-section">
        <div class="user-input-row">
            <input type="text" id="userInput" placeholder="Enter user name..">
            <button id="addUserBtn">+ Add User</button>
        </div>

        <div class="user-tabs" id="userTabs">
            <button class="user-tab active" data-user="all">All Users</button>
        </div>
    </div>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task here..">
        <select id="userSelect">
            <option value="">--Assign to User--</option>
        </select>
        <button id="addBtn">+ Add</button>
    </div>

    <div class="filters">
        <p id="count"></p>
        <div class="filter-btns">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
    </div>

    <div id="taskList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
